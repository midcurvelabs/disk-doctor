<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Disk Doctor">
  <title>Disk Doctor</title>
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a4fc0"/>
      <stop offset="1" stop-color="#052a70"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="0.35" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="barclip">
      <rect x="195" y="431" width="634" height="159" rx="80" ry="80"/>
    </clipPath>
    <filter id="ds" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
      <feOffset dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- macOS squircle plate -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#plate)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#sheen)"/>

  <!-- 4-segment memory-pressure bar -->
  <g clip-path="url(#barclip)" filter="url(#ds)">
    <rect x="195" y="431" width="114" height="159" fill="#0a84ff"/>
    <rect x="309" y="431" width="190" height="159" fill="#bf5af2"/>
    <rect x="499" y="431" width="190" height="159" fill="#ff9f0a"/>
    <rect x="689" y="431" width="140" height="159" fill="#8c8c96"/>
  </g>
</svg>
